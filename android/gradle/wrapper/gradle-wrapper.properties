distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
# 国内开发: 用腾讯云 Gradle 镜像下 distribution zip (100MB+). 走官方
# services.gradle.org 可能要小时级. 切到 tencent 后通常 1-3 分钟.
# 如果腾讯也慢, 换阿里云: https\://mirrors.aliyun.com/macports/distfiles/gradle/gradle-8.7-bin.zip
# 或华为云: https\://mirrors.huaweicloud.com/gradle/distributions/v8.7.0/gradle-8.7-bin.zip
distributionUrl=https\://mirrors.cloud.tencent.com/gradle/gradle-9.4.1-bin.zip
networkTimeout=30000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
