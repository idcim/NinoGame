# NinoGame admin frontend nginx (生产 / docker-compose 共用)
#
# 跟 parent frontend 同结构, 唯一区别: 加大 client_max_body_size 让
# Agent 升级包 (~130MB zip) 能直接通过 admin UI 上传; parent 不需要.

upstream ninogame_backend {
    # 同 docker 网络里的 backend 容器
    server ninogame-backend:8088;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Admin 上传 Agent 包用 (PyInstaller onedir 压缩后 ~130MB)
    client_max_body_size 300m;
    client_body_buffer_size 1m;
    proxy_request_buffering off;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # 编译产物 (assets/) 长缓存
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # logo / favicon 中等缓存
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public";
    }

    # WebSocket: /ws/agent (Agent 长连接) + /ws/parent (浏览器订阅)
    location /ws/ {
        proxy_pass http://ninogame_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # REST API
    location ~ ^/(auth|api|health) {
        proxy_pass http://ninogame_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA 路由 fallback: /device/:id 等都回 index.html
    location / {
        try_files $uri $uri/ /index.html;
        # index.html 不缓存, 保证发版立刻生效
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 简单健康检查
    location = /__nginx_health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
