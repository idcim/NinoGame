# NinoGame frontend nginx (生产 / docker-compose 共用)
#
# 静态 SPA + 内部反代 /auth /api /ws /health 到 backend 容器
# Backend 通过 docker 网络的 container_name 解析: ninogame-backend
#
# 本地 docker compose 和 1Panel 生产共用此配置, 前提是 backend
# 容器名都是 ninogame-backend (已在两个 compose 里固定)。

upstream ninogame_backend {
    # 同 docker 网络里的 backend 容器
    server ninogame-backend:8088;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # 编译产物 (assets/) 长缓存
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # logo / favicon 中等缓存
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public";
    }

    # WebSocket: /ws/agent (Agent 长连接) + /ws/parent (浏览器订阅)
    location /ws/ {
        proxy_pass http://ninogame_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # REST API
    location ~ ^/(auth|api|health) {
        proxy_pass http://ninogame_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA 路由 fallback: /device/:id 等都回 index.html
    location / {
        try_files $uri $uri/ /index.html;
        # index.html 不缓存, 保证发版立刻生效
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 简单健康检查
    location = /__nginx_health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
