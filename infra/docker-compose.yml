# NinoGame 本地开发 Docker compose
#
# 同时拉起 Postgres + Backend, 一条命令搞定:
#   cd infra && docker compose up -d
#
# 验证:
#   curl http://127.0.0.1:8088/health
#
# 改 backend 代码:
#   docker compose up -d --build backend
#   (或者本地 npm run dev 跑代码热重启; 把 compose 里的 backend 停了即可)
#
# 1Panel 生产部署用另一个文件: docker-compose.prod.yml

services:
  postgres:
    image: postgres:15-alpine
    container_name: ninogame-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ninogame
      POSTGRES_USER: ninogame
      POSTGRES_PASSWORD: ninogame_dev
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ninogame -d ninogame"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ninogame-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8088
      # 容器内通过 docker DNS 找 postgres
      DATABASE_URL: postgresql://ninogame:ninogame_dev@postgres:5432/ninogame
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-prod}
      JWT_EXPIRES_IN: 7d
      LOG_LEVEL: info
      LOG_PRETTY: "false"
      TZ: Asia/Shanghai
      # 无感更新: Agent 拼接下载 URL + 包存盘目录
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:8088}
      ARTIFACTS_DIR: /var/lib/ninogame/artifacts
      # 存储驱动 (v0.4.0+): local | s3 | aliyun_oss
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      # S3-compatible (AWS / MinIO / B2 / R2 / 腾讯 COS / 七牛 S3 模式)
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      # 阿里云 OSS
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_REGION: ${OSS_REGION:-}
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY:-}
      OSS_SECRET_KEY: ${OSS_SECRET_KEY:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      # 首个 admin bootstrap (v0.4.0+); 创建成功后建议清空
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-ninogame_admin_dev}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      # Agent 升级包外挂卷 (镜像重建不丢)
      - artifacts:/var/lib/ninogame/artifacts
      # v0.4.9+ CHANGELOG.md 挂载, /api/changelog 端点直接读;
      # repo 里改 markdown 立刻生效, 不用 rebuild backend 镜像
      - ../CHANGELOG.md:/app/CHANGELOG.md:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8088/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ninogame-frontend
    restart: unless-stopped
    ports:
      # 暴露给宿主, 浏览器打 http://127.0.0.1:8080
      # (5173 留给 npm run dev 的 vite HMR, 两套不冲突)
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/__nginx_health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin-frontend:
    # v0.4.0+ 独立管理后台 (admin.ninogame.{domain})
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: ninogame-admin-frontend
    restart: unless-stopped
    ports:
      # 浏览器打 http://127.0.0.1:8081 (parent 在 8080); vite dev 用 5174
      - "127.0.0.1:8081:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/__nginx_health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ninogame-pgadmin
    restart: unless-stopped
    profiles: ["gui"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ninogame.local
      PGADMIN_DEFAULT_PASSWORD: ninogame_dev
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    name: ninogame-pgdata
  artifacts:
    name: ninogame-artifacts

networks:
  default:
    name: ninogame-net
