# NinoGame 本地开发 Docker compose
#
# 同时拉起 Postgres + Backend, 一条命令搞定:
#   cd infra && docker compose up -d
#
# 验证:
#   curl http://127.0.0.1:8088/health
#
# 改 backend 代码:
#   docker compose up -d --build backend
#   (或者本地 npm run dev 跑代码热重启; 把 compose 里的 backend 停了即可)
#
# 1Panel 生产部署用另一个文件: docker-compose.prod.yml

services:
  postgres:
    image: postgres:15-alpine
    container_name: ninogame-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ninogame
      POSTGRES_USER: ninogame
      POSTGRES_PASSWORD: ninogame_dev
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ninogame -d ninogame"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ninogame-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8088
      # 容器内通过 docker DNS 找 postgres
      DATABASE_URL: postgresql://ninogame:ninogame_dev@postgres:5432/ninogame
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-prod}
      JWT_EXPIRES_IN: 7d
      LOG_LEVEL: info
      LOG_PRETTY: "false"
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:8088"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8088/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ninogame-frontend
    restart: unless-stopped
    ports:
      # 暴露给宿主, 浏览器打 http://127.0.0.1:8080
      # (5173 留给 npm run dev 的 vite HMR, 两套不冲突)
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/__nginx_health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ninogame-pgadmin
    restart: unless-stopped
    profiles: ["gui"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ninogame.local
      PGADMIN_DEFAULT_PASSWORD: ninogame_dev
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    name: ninogame-pgdata

networks:
  default:
    name: ninogame-net
