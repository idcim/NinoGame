# NinoGame 本地开发数据库
#
# 启动：
#   cd infra && docker compose up -d
# 停止：
#   docker compose down            # 保留数据
#   docker compose down -v         # 连同 volume 一起清掉
#
# 连接串（Backend / psql 用）：
#   postgresql://ninogame:ninogame_dev@localhost:5433/ninogame
#
# schema = NinoGame (大小写敏感，需用双引号；与生产 1Panel 上的 schema 同名)
#
# 端口选 5433 避开常用 5432，避免和本机已有 Postgres 冲突。

services:
  postgres:
    image: postgres:15-alpine
    container_name: ninogame-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ninogame
      POSTGRES_USER: ninogame
      POSTGRES_PASSWORD: ninogame_dev
      # 容器内时区
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5433:5432"   # 只绑本机，不暴露公网
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ninogame -d ninogame"]
      interval: 5s
      timeout: 5s
      retries: 10

  # pgAdmin 可选，需要图形客户端时打开
  # 启动：docker compose --profile gui up -d
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ninogame-pgadmin
    restart: unless-stopped
    profiles: ["gui"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ninogame.local
      PGADMIN_DEFAULT_PASSWORD: ninogame_dev
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    name: ninogame-pgdata

networks:
  default:
    name: ninogame-net
